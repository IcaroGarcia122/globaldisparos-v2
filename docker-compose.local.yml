services:
  postgres:
    image: postgres:15
    container_name: saas_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: icit0707
      POSTGRES_DB: globaldisparos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: saas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  evolution:
    image: evoapicloud/evolution-api:v2.3.6
    container_name: evolution_api
    ports:
      - "8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8081

      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: myfKey123456789
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: true

      # v2: banco PostgreSQL separado
      DATABASE_ENABLED: true
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:icit0707@saas_postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: true
      DATABASE_SAVE_DATA_NEW_MESSAGE: true
      DATABASE_SAVE_MESSAGE_UPDATE: true
      DATABASE_SAVE_DATA_CONTACTS: true
      DATABASE_SAVE_DATA_CHATS: true
      DATABASE_SAVE_DATA_LABELS: true
      DATABASE_SAVE_DATA_HISTORIC: true

      # Redis para cache/sessão
      CACHE_REDIS_ENABLED: true
      CACHE_REDIS_URI: redis://saas_redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: true
      CACHE_LOCAL_ENABLED: false

      # WhatsApp
      CONFIG_SESSION_PHONE_CLIENT: GlobDisparos
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: 30
      QRCODE_COLOR: "#000000"

      GROUPS_IGNORE: false

      LOG_LEVEL: ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      LOG_COLOR: true
      LOG_BAILEYS: error

      DEL_INSTANCE: false
      WEBHOOK_GLOBAL_ENABLED: false

    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: